version: '3.8'
services:
  factorio-server-manager:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: factorio-server-manager
    ports:
      - "5000:5000"
    volumes:
      - factorio_data:/app/data
      - factorio_logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  factorio_data:
  factorio_logs:
